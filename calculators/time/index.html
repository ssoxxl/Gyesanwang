<!DOCTYPE html>

<head>

</head>
<body>
  <div class="site-shell"><header class="site-header"><div class="site-header-inner"><a class="brand-lockup" href="/"><span class="brand-mark">계</span><span class="brand-copy"><strong>계산왕.com</strong><span>TIME TOOL</span></span></a><nav class="main-nav"><a href="/">HOME</a><a class="active" href="/calculators/">TOOLS</a><a href="/learn/time-calculation/">GUIDE</a></nav><button class="theme-toggle" type="button" data-theme-toggle>◐</button></div></header><main class="page-wrap"><section class="tool-box"><span class="eyebrow">UTILITY</span><h1 class="page-title">시간 합산 계산기</h1><p class="lede">공부 시간, 운동 시간, 업무 시간을 더할 때 60분 체계 때문에 흔들리면 이 도구로 바로 정리해 보세요.</p><div class="form-grid"><div class="field"><label for="timeInput">시간 목록</label><input id="timeInput" type="text" value="1:20, 0:45, 2:15"></div></div><div class="inline-actions"><button class="solid-button" type="button" id="timeCalc">계산하기</button></div><div class="result-box" id="timeResult"><strong>OUTPUT</strong><div>총 4시간 20분</div></div><div class="inline-actions"><a class="chip-link" href="/learn/time-calculation/">TIME GUIDE</a><a class="chip-link" href="/games/change/">CHANGE MODE</a></div></section></main></div>
  <script>document.getElementById("timeCalc").addEventListener("click",function(){const total=document.getElementById("timeInput").value.split(",").map((item)=>item.trim()).filter(Boolean).reduce((sum,item)=>{const parts=item.split(":").map(Number);if(parts.length!==2||parts.some(Number.isNaN))return sum;return sum+(parts[0]*60)+parts[1];},0);const hours=Math.floor(total/60);const minutes=total%60;document.getElementById("timeResult").innerHTML=`<strong>OUTPUT</strong><div>총 ${hours}시간 ${minutes}분</div>`;});</script>
</body>
