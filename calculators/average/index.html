<body>
  <div class="site-shell"><header class="site-header"><div class="site-header-inner"><a class="brand-lockup" href="/"><span class="brand-mark">계</span><span class="brand-copy"><strong>계산왕.com</strong><span>AVERAGE TOOL</span></span></a><nav class="main-nav"><a href="/">HOME</a><a href="/games/mental-speed/">GAMES</a><a class="active" href="/calculators/">TOOLS</a></nav><button class="theme-toggle" type="button" data-theme-toggle>◐</button></div></header><main class="page-wrap"><section class="tool-box"><span class="eyebrow">UTILITY</span><h1 class="page-title">평균 계산기</h1><p class="lede">점수나 기록처럼 여러 숫자의 중심값을 빠르게 정리하고 싶을 때 사용하는 도구입니다.</p><div class="form-grid"><div class="field"><label for="averageInput">숫자 목록</label><input id="averageInput" type="text" value="78, 85, 92, 88"></div></div><div class="inline-actions"><button class="solid-button" type="button" id="averageCalc">계산하기</button></div><div class="result-box" id="averageResult"><strong>OUTPUT</strong><div>합계 343 / 평균 85.75</div></div><div class="inline-actions"><a class="chip-link" href="/games/mental-speed/">SPEED TEST</a><a class="chip-link" href="/learn/mental-math/">MENTAL GUIDE</a></div></section></main></div>
  <script>document.getElementById("averageCalc").addEventListener("click",function(){const numbers=document.getElementById("averageInput").value.split(",").map((item)=>Number(item.trim())).filter((value)=>!Number.isNaN(value));if(!numbers.length){return;}const total=numbers.reduce((sum,value)=>sum+value,0);const average=total/numbers.length;document.getElementById("averageResult").innerHTML=`<strong>OUTPUT</strong><div>합계 ${total} / 평균 ${average}</div>`;});</script>
