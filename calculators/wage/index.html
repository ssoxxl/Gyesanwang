  <div class="site-shell"><header class="site-header"><div class="site-header-inner"><a class="brand-lockup" href="/"><span class="brand-mark">계</span><span class="brand-copy"><strong>계산왕.com</strong><span>WAGE TOOL</span></span></a><nav class="main-nav"><a href="/">HOME</a><a class="active" href="/calculators/">TOOLS</a><a href="/learn/wage-sense/">GUIDE</a></nav><button class="theme-toggle" type="button" data-theme-toggle>◐</button></div></header><main class="page-wrap"><section class="tool-box"><span class="eyebrow">UTILITY</span><h1 class="page-title">시급 환산기</h1><p class="lede">현재 시급이 주급과 월급 감각으로는 어느 정도인지 빠르게 확인하는 도구입니다. 세전 기준의 가벼운 환산용으로 보시면 됩니다.</p><div class="form-grid"><div class="field"><label for="wageHourly">시급</label><input id="wageHourly" type="number" value="11000"></div><div class="field"><label for="wageHours">주당 근무 시간</label><input id="wageHours" type="number" value="20"></div></div><div class="inline-actions"><button class="solid-button" type="button" id="wageCalc">계산하기</button></div><div class="result-box" id="wageResult"><strong>OUTPUT</strong><div>주급 220,000원 / 월급 약 953,260원</div></div><div class="inline-actions"><a class="chip-link" href="/learn/wage-sense/">WAGE GUIDE</a><a class="chip-link" href="/calculators/time/">TIME TOOL</a></div></section></main></div>
  <script>document.getElementById("wageCalc").addEventListener("click",function(){const hourly=Number(document.getElementById("wageHourly").value);const hours=Number(document.getElementById("wageHours").value);const weekly=hourly*hours;const monthly=Math.round(weekly*52/12);document.getElementById("wageResult").innerHTML=`<strong>OUTPUT</strong><div>주급 ${weekly.toLocaleString()}원 / 월급 약 ${monthly.toLocaleString()}원</div>`;});</script>
