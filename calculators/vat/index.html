<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부가세 계산기 | 계산왕.com</title>
  <meta name="description" content="합계와 공급가 기준을 나눠 부가세를 계산하는 도구입니다.">
  <link rel="canonical" href="https://xn--989av19a47d.com/calculators/vat/">
  <meta property="og:url" content="https://xn--989av19a47d.com/calculators/vat/">
  <link rel="stylesheet" href="/site.css">
  <script src="/site.js" defer></script>
</head>
<body>
  <div class="site-shell"><header class="site-header"><div class="site-header-inner"><a class="brand-lockup" href="/"><span class="brand-mark">계</span><span class="brand-copy"><strong>계산왕.com</strong><span>VAT TOOL</span></span></a><nav class="main-nav"><a href="/">HOME</a><a class="active" href="/calculators/">TOOLS</a><a href="/learn/percent-tricks/">GUIDE</a></nav><button class="theme-toggle" type="button" data-theme-toggle>◐</button></div></header><main class="page-wrap"><section class="tool-box"><span class="eyebrow">UTILITY</span><h1 class="page-title">부가세 계산기</h1><p class="lede">합계 금액이 부가세 포함인지, 공급가 기준인지 헷갈릴 때 세부 금액을 빠르게 분리하는 도구입니다.</p><div class="form-grid"><div class="field"><label for="vatAmount">금액</label><input id="vatAmount" type="number" value="110000"></div><div class="field"><label for="vatMode">입력 기준</label><select id="vatMode"><option value="total">합계금액(부가세 포함)</option><option value="supply">공급가액(부가세 제외)</option></select></div></div><div class="inline-actions"><button class="solid-button" type="button" id="vatCalc">계산하기</button></div><div class="result-box" id="vatResult"><strong>OUTPUT</strong><div>공급가액 100,000원 / 부가세 10,000원 / 합계 110,000원</div></div><div class="inline-actions"><a class="chip-link" href="/learn/percent-tricks/">PERCENT GUIDE</a><a class="chip-link" href="/calculators/percent/">PERCENT TOOL</a></div></section></main></div>
  <script>document.getElementById("vatCalc").addEventListener("click",function(){const amount=Number(document.getElementById("vatAmount").value);const mode=document.getElementById("vatMode").value;let supply=0;let vat=0;let total=0;if(mode==="total"){supply=Math.round(amount/1.1);vat=amount-supply;total=amount;}else{supply=amount;vat=Math.round(amount*0.1);total=supply+vat;}document.getElementById("vatResult").innerHTML=`<strong>OUTPUT</strong><div>공급가액 ${supply.toLocaleString()}원 / 부가세 ${vat.toLocaleString()}원 / 합계 ${total.toLocaleString()}원</div>`;});</script>
</body>
</html>
