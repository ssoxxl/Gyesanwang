<body>
  <div class="site-shell"><header class="site-header"><div class="site-header-inner"><a class="brand-lockup" href="/"><span class="brand-mark">계</span><span class="brand-copy"><strong>계산왕.com</strong><span>DISCOUNT TOOL</span></span></a><nav class="main-nav"><a href="/">HOME</a><a href="/games/percent/">GAMES</a><a class="active" href="/calculators/">TOOLS</a><a href="/learn/discount-mistakes/">GUIDE</a></nav><button class="theme-toggle" type="button" data-theme-toggle>◐</button></div></header><main class="page-wrap"><section class="tool-box"><span class="eyebrow">UTILITY</span><h1 class="page-title">할인 계산기</h1><p class="lede">가격표를 보자마자 실제 결제 금액을 확인하고 싶을 때 바로 호출하는 도구입니다. 할인액과 최종 금액을 함께 보여드립니다.</p><div class="form-grid"><div class="field"><label for="discountPrice">정가</label><input id="discountPrice" type="number" value="59000"></div><div class="field"><label for="discountRate">할인율(%)</label><input id="discountRate" type="number" value="20"></div></div><div class="inline-actions"><button class="solid-button" type="button" id="discountCalc">계산하기</button></div><div class="result-box" id="discountResult"><strong>OUTPUT</strong><div>할인액 11,800원 / 결제 금액 47,200원</div></div><h2>판정 메모</h2><p>연속 할인은 단순 합산으로 계산하면 안 됩니다. 줄어든 가격에서 다시 할인율이 적용되는 구조인지 먼저 확인하시면 실수가 크게 줄어듭니다.</p><div class="inline-actions"><a class="chip-link" href="/learn/discount-mistakes/">DISCOUNT GUIDE</a><a class="chip-link" href="/games/percent/">PERCENT MODE</a></div></section></main></div>
  <script>document.getElementById("discountCalc").addEventListener("click",function(){const price=Number(document.getElementById("discountPrice").value);const rate=Number(document.getElementById("discountRate").value);const discount=Math.round(price*rate/100);const finalPrice=price-discount;document.getElementById("discountResult").innerHTML=`<strong>OUTPUT</strong><div>할인액 ${discount.toLocaleString()}원 / 결제 금액 ${finalPrice.toLocaleString()}원</div>`;});</script>
