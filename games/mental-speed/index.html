<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>암산 속도 테스트 | 계산왕.com</title>
  <meta name="description" content="제한 시간 안에 사칙연산을 풀면서 암산 속도와 정확도를 같이 체크해보세요.">
  <link rel="canonical" href="https://xn--989av19a47d.com/games/mental-speed/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="암산 속도 테스트 | 계산왕.com">
  <meta property="og:description" content="지금 어디서 막히는지 바로 확인해보세요.">
  <meta property="og:url" content="https://xn--989av19a47d.com/games/mental-speed/">
  <link rel="stylesheet" href="/site.css">
  <script src="/site.js" defer></script>
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand-lockup" href="/"><span class="brand-mark">계</span><span class="brand-copy"><strong>계산왕.com</strong><span>STAGE 01 / SPEED TEST</span></span></a>
        <nav class="main-nav">
          <a href="/">HOME</a>
          <a class="active" href="/games/">GAMES</a>
          <a href="/calculators/">TOOLS</a>
          <a href="/learn/mental-math/">GUIDE</a>
        </nav>
        <button class="theme-toggle" type="button" data-theme-toggle>◐</button>
      </div>
    </header>
    <main class="page-wrap">
      <section class="game-box">
        <span class="eyebrow">STAGE 01</span>
        <h1 class="page-title">암산 속도 테스트</h1>
        <p class="lede">60초 안에 문제를 풀면서 속도와 정확도를 함께 확인해보세요. 빠르게 푸는 것도 중요하지만, 계속 맞히는 흐름을 만드는 쪽이 더 중요합니다.</p>
        <div class="score-board">
          <div class="score-box"><span>TIME</span><strong id="time">60</strong></div>
          <div class="score-box"><span>SCORE</span><strong id="score">0</strong></div>
          <div class="score-box"><span>RATE</span><strong id="accuracy">0%</strong></div>
        </div>
        <div class="question-box">
          <span>MISSION</span>
          <strong id="question">START를 눌러 주세요</strong>
        </div>
        <div class="form-grid">
          <div class="field">
            <label for="answer">정답 입력</label>
            <input id="answer" type="number" inputmode="numeric" placeholder="정답을 입력하세요">
          </div>
        </div>
        <div class="inline-actions">
          <button class="solid-button" type="button" id="startButton">▶ START</button>
          <button class="ghost-button" type="button" id="submitButton">✓ ENTER</button>
        </div>
        <div class="result-box" id="feedback">
          <strong>READY</strong>
          <div>덧셈은 큰 자리부터, 뺄셈은 남는 값부터, 곱셈은 5배나 10배 기준부터 떠올려 보세요.</div>
        </div>
        <div class="section">
          <h2>RELATED MODE</h2>
          <div class="inline-actions">
            <a class="chip-link" href="/learn/mental-math/">MENTAL GUIDE</a>
            <a class="chip-link" href="/calculators/average/">AVERAGE TOOL</a>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script>
    (() => {
      const timeEl = document.getElementById("time");
      const scoreEl = document.getElementById("score");
      const accuracyEl = document.getElementById("accuracy");
      const questionEl = document.getElementById("question");
      const answerEl = document.getElementById("answer");
      const feedbackEl = document.getElementById("feedback");
      const startButton = document.getElementById("startButton");
      const submitButton = document.getElementById("submitButton");
      let answer = 0;
      let score = 0;
      let tries = 0;
      let time = 60;
      let timer = null;

      function nextQuestion() {
        const a = Math.floor(Math.random() * 30) + 2;
        const b = Math.floor(Math.random() * 20) + 2;
        const type = Math.floor(Math.random() * 3);

        if (type === 0) {
          answer = a + b;
          questionEl.textContent = `${a} + ${b}`;
        } else if (type === 1) {
          const minuend = Math.floor(Math.random() * 50) + 20;
          const subtrahend = Math.floor(Math.random() * (minuend - 1)) + 1;
          answer = minuend - subtrahend;
          questionEl.textContent = `${minuend} - ${subtrahend}`;
        } else {
          const x = Math.floor(a / 2) + 2;
          const y = Math.floor(b / 2) + 2;
          answer = x * y;
          questionEl.textContent = `${x} × ${y}`;
        }

        answerEl.value = "";
        answerEl.focus();
      }

      function refreshStats() {
        timeEl.textContent = String(time);
        scoreEl.textContent = String(score);
        const accuracy = tries === 0 ? 0 : Math.round((score / tries) * 100);
        accuracyEl.textContent = `${accuracy}%`;
      }

      function submit() {
        if (!timer) return;
        tries += 1;
        if (Number(answerEl.value) === answer) {
          score += 1;
          feedbackEl.innerHTML = "<strong>CLEAR</strong><div>정답입니다! 다음 문제로 넘어갑니다.</div>";
        } else {
          feedbackEl.innerHTML = `<strong style="color: var(--accent3);">MISS</strong><div>정답은 ${answer}입니다. 다시 한번 도전해 보세요.</div>`;
        }
        refreshStats();
        nextQuestion();
      }

      startButton.addEventListener("click", () => {
        clearInterval(timer);
        score = 0;
        tries = 0;
        time = 60;
        refreshStats();
        feedbackEl.innerHTML = "<strong>START</strong><div>리듬을 유지하면서 차분하게 풀어보세요.</div>";
        nextQuestion();
        timer = window.setInterval(() => {
          time -= 1;
          refreshStats();
          if (time <= 0) {
            clearInterval(timer);
            timer = null;
            questionEl.textContent = "GAME OVER";
            feedbackEl.innerHTML = `<strong style="color: var(--accent3);">GAME OVER</strong><div>${score}문제 정답 / 정확도 ${accuracyEl.textContent}. 계속 도전하시겠습니까?</div>`;
          }
        }, 1000);
      });

      submitButton.addEventListener("click", submit);
      answerEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter") submit();
      });
      refreshStats();
    })();
  </script>
</body>
</html>
