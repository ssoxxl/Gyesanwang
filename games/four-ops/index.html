<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사칙연산 콤보 게임 | 계산왕.com</title>
  <meta name="description" content="연속 정답으로 콤보를 이어가며 사칙연산 감각을 올리는 게임입니다.">
  <link rel="canonical" href="https://xn--989av19a47d.com/games/four-ops/">
  <meta property="og:url" content="https://xn--989av19a47d.com/games/four-ops/">
  <link rel="stylesheet" href="/site.css">
  <script src="/site.js" defer></script>
</head>
<body>
  <div class="site-shell">
    <header class="site-header"><div class="site-header-inner"><a class="brand-lockup" href="/"><span class="brand-mark">계</span><span class="brand-copy"><strong>계산왕.com</strong><span>STAGE 02 / COMBO</span></span></a><nav class="main-nav"><a href="/">HOME</a><a class="active" href="/games/">GAMES</a><a href="/learn/mental-math/">GUIDE</a></nav><button class="theme-toggle" type="button" data-theme-toggle>◐</button></div></header>
    <main class="page-wrap">
      <section class="game-box">
        <span class="eyebrow">STAGE 02</span>
        <h1 class="page-title">사칙연산 콤보 게임</h1>
        <p class="lede">연속으로 맞히실수록 점수 배수가 올라갑니다. 무작정 빠르게 누르기보다 흐름을 끊지 않는 쪽이 훨씬 중요합니다.</p>
        <div class="score-board"><div class="score-box"><span>SCORE</span><strong id="comboScore">0</strong></div><div class="score-box"><span>COMBO</span><strong id="comboStreak">0</strong></div><div class="score-box"><span>BEST</span><strong id="comboBest">0</strong></div></div>
        <div class="question-box"><span>MISSION</span><strong id="comboQuestion">START를 눌러 세션을 개시해 주세요</strong></div>
        <div class="form-grid"><div class="field"><label for="comboAnswer">답안 입력</label><input id="comboAnswer" type="number" inputmode="numeric" placeholder="값을 입력하세요"></div></div>
        <div class="inline-actions"><button class="solid-button" type="button" id="comboStart">▶ START</button><button class="ghost-button" type="button" id="comboSubmit">✓ ENTER</button></div>
        <div class="result-box" id="comboFeedback"><strong>READY</strong><div>세션이 개시되면 콤보 로그가 활성화됩니다.</div></div>
        <div class="section"><h2>RELATED MODE</h2><div class="inline-actions"><a class="chip-link" href="/games/mental-speed/">SPEED TEST</a><a class="chip-link" href="/learn/mental-math/">MENTAL GUIDE</a></div></div>
      </section>
    </main>
  </div>
  <script>
    (function () {
      const scoreEl = document.getElementById("comboScore");
      const streakEl = document.getElementById("comboStreak");
      const bestEl = document.getElementById("comboBest");
      const questionEl = document.getElementById("comboQuestion");
      const answerEl = document.getElementById("comboAnswer");
      const feedback = document.getElementById("comboFeedback");

      let solution = 0;
      let score = 0;
      let current = 0;
      let best = 0;

      function nextQuestion() {
        const ops = ["+", "-", "×"];
        const op = ops[Math.floor(Math.random() * ops.length)];
        let a = Math.floor(Math.random() * 20) + 3;
        let b = Math.floor(Math.random() * 15) + 2;

        if (op === "+") {
          solution = a + b;
        } else if (op === "-") {
          if (b > a) {
            const swap = a;
            a = b;
            b = swap;
          }
          solution = a - b;
        } else {
          solution = a * b;
        }

        questionEl.textContent = `${a} ${op} ${b}`;
        answerEl.value = "";
        answerEl.focus();
      }

      function startGame() {
        score = 0;
        current = 0;
        scoreEl.textContent = "0";
        streakEl.textContent = "0";
        feedback.innerHTML = "<strong>SESSION START</strong><div>콤보 추적을 시작합니다. 첫 문제를 전개합니다.</div>";
        nextQuestion();
      }

      function submit() {
        const value = Number(answerEl.value);
        if (Number.isNaN(value)) {
          return;
        }

        if (value === solution) {
          current += 1;
          best = Math.max(best, current);
          score += current;
          feedback.innerHTML = `<strong>CLEAR</strong><div>연산 성공. 콤보 ${current}가 유지됩니다.</div>`;
        } else {
          current = 0;
          feedback.innerHTML = `<strong style="color: var(--accent3);">MISS</strong><div>판정 실패. 정답은 ${solution}입니다. 콤보가 초기화되었습니다.</div>`;
        }

        scoreEl.textContent = String(score);
        streakEl.textContent = String(current);
        bestEl.textContent = String(best);
        nextQuestion();
      }

      document.getElementById("comboStart").addEventListener("click", startGame);
      document.getElementById("comboSubmit").addEventListener("click", submit);
      answerEl.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          submit();
        }
      });
    })();
  </script>
</body>
</html>
