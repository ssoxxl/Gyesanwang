<head>

  <meta name="description" content="숫자 크기를 빠르게 비교하는 감각을 올리는 게임입니다.">

  <meta property="og:url" content="https://xn--989av19a47d.com/games/number-sense/">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6054655662859239" crossorigin="anonymous"></script>
</head>
<body>
  <div class="site-shell"><header class="site-header"><div class="site-header-inner"><a class="brand-lockup" href="/"><span class="brand-mark">계</span><span class="brand-copy"><strong>계산왕.com</strong><span>STAGE 05 / NUMBER SENSE</span></span></a><nav class="main-nav"><a href="/">HOME</a><a class="active" href="/games/">GAMES</a><a href="/learn/middle-school-practice/">GUIDE</a></nav><button class="theme-toggle" type="button" data-theme-toggle>◐</button></div></header><main class="page-wrap"><section class="game-box"><span class="eyebrow">STAGE 05</span><h1 class="page-title">큰 수 비교 게임</h1><p class="lede">둘 중 더 큰 수를 빠르게 판정하면서 숫자 크기 감각을 붙이는 훈련 모드입니다.</p><div class="question-box"><span>MISSION</span><strong id="senseQuestion">813,420 vs 807,950</strong></div><div class="inline-actions"><button class="solid-button" type="button" id="pickLeft">◀ LEFT</button><button class="ghost-button" type="button" id="pickRight">RIGHT ▶</button><button class="ghost-button" type="button" id="senseNext">▶ NEXT</button></div><div class="result-box" id="senseFeedback"><strong>READY</strong><div>왼쪽과 오른쪽 중 더 큰 수를 선택해 주세요.</div></div><div class="section"><h2>RELATED MODE</h2><div class="inline-actions"><a class="chip-link" href="/learn/middle-school-practice/">NUMBER GUIDE</a><a class="chip-link" href="/games/percent/">PERCENT MODE</a></div></div></section></main></div>
  <script>
    (function () {
      const q = document.getElementById("senseQuestion");
      const feedback = document.getElementById("senseFeedback");
      let left = 0;
      let right = 0;

      function next() {
        left = Math.floor(Math.random() * 900000) + 100000;
        right = Math.floor(Math.random() * 900000) + 100000;
        while (left === right) {
          right = Math.floor(Math.random() * 900000) + 100000;
        }
        q.textContent = `${left.toLocaleString()} vs ${right.toLocaleString()}`;
      }

      function pick(side) {
        const correct = (side === "left" && left > right) || (side === "right" && right > left);
        if (correct) {
          feedback.innerHTML = "<strong>CLEAR</strong><div>판정 성공. 자릿수 감각이 정확하게 작동했습니다.</div>";
        } else {
          const bigger = left > right ? left : right;
          feedback.innerHTML = `<strong style="color: var(--accent3);">MISS</strong><div>판정 실패. 더 큰 수는 ${bigger.toLocaleString()}입니다.</div>`;
        }
        next();
      }

      document.getElementById("pickLeft").addEventListener("click", function () { pick("left"); });
      document.getElementById("pickRight").addEventListener("click", function () { pick("right"); });
      document.getElementById("senseNext").addEventListener("click", next);
      next();
    })();
  </script>
</body>
</html>
