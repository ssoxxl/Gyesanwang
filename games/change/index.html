<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>거스름돈 계산 게임 | 계산왕.com</title>
  <meta name="description" content="가격과 낸 돈을 보고 거스름돈을 빠르게 계산하는 실전형 게임입니다.">
  <link rel="canonical" href="https://xn--989av19a47d.com/games/change/">
  <meta property="og:url" content="https://xn--989av19a47d.com/games/change/">
  <link rel="stylesheet" href="/site.css">
  <script src="/site.js" defer></script>
</head>
<body>
  <div class="site-shell">
    <header class="site-header"><div class="site-header-inner"><a class="brand-lockup" href="/"><span class="brand-mark">계</span><span class="brand-copy"><strong>계산왕.com</strong><span>STAGE 04 / CHANGE</span></span></a><nav class="main-nav"><a href="/">HOME</a><a class="active" href="/games/">GAMES</a><a href="/learn/change-thinking/">GUIDE</a></nav><button class="theme-toggle" type="button" data-theme-toggle>◐</button></div></header>
    <main class="page-wrap"><section class="game-box"><span class="eyebrow">STAGE 04</span><h1 class="page-title">거스름돈 계산 게임</h1><p class="lede">생활에서 바로 써먹을 수 있는 계산입니다. 가격과 낸 돈을 보고 남는 금액을 빠르게 계산해보세요.</p><div class="question-box"><span>MISSION</span><strong id="changeQuestion">물건값 7,300원 / 낸 돈 10,000원</strong></div><div class="form-grid"><div class="field"><label for="changeAnswer">거스름돈 입력</label><input id="changeAnswer" type="number" inputmode="numeric" placeholder="정답을 입력하세요"></div></div><div class="inline-actions"><button class="solid-button" type="button" id="changeNew">▶ NEXT</button><button class="ghost-button" type="button" id="changeCheck">✓ ENTER</button></div><div class="result-box" id="changeFeedback"><strong>READY</strong><div>바로 빼셔도 되고, 목표 금액까지 얼마나 더 가는지 세셔도 됩니다.</div></div><div class="section"><h2>RELATED MODE</h2><div class="inline-actions"><a class="chip-link" href="/learn/change-thinking/">CHANGE GUIDE</a><a class="chip-link" href="/calculators/time/">TIME TOOL</a></div></div></section></main>
  </div>
  <script>
    (() => {
      const q = document.getElementById("changeQuestion");
      const a = document.getElementById("changeAnswer");
      const f = document.getElementById("changeFeedback");
      let solution = 0;
      function next() {
        const price = (Math.floor(Math.random() * 18) + 2) * 500 + 300;
        const paid = [10000, 20000, 50000][Math.floor(Math.random() * 3)];
        solution = paid - price;
        q.textContent = `물건값 ${price.toLocaleString()}원 / 낸 돈 ${paid.toLocaleString()}원`;
        a.value = "";
      }
      function check() {
        if (Number(a.value) === solution) {
          f.innerHTML = "<strong>CLEAR</strong><div>정답입니다! 다음 문제도 이어서 확인해 보세요.</div>";
        } else {
          f.innerHTML = `<strong style="color: var(--accent3);">MISS</strong><div>정답은 ${solution.toLocaleString()}원입니다.</div>`;
        }
      }
      document.getElementById("changeNew").addEventListener("click", next);
      document.getElementById("changeCheck").addEventListener("click", check);
      a.addEventListener("keydown", (event) => { if (event.key === "Enter") check(); });
      next();
    })();
  </script>
</body>
</html>
