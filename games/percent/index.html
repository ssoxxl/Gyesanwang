<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퍼센트 감각 게임 | 계산왕.com</title>
  <meta name="description" content="퍼센트를 쪼개 보는 감각을 반복해서 익히는 훈련 게임입니다.">
  <link rel="canonical" href="https://xn--989av19a47d.com/games/percent/">
  <meta property="og:url" content="https://xn--989av19a47d.com/games/percent/">
  <link rel="stylesheet" href="/site.css">
  <script src="/site.js" defer></script>
</head>
<body>
  <div class="site-shell"><header class="site-header"><div class="site-header-inner"><a class="brand-lockup" href="/"><span class="brand-mark">계</span><span class="brand-copy"><strong>계산왕.com</strong><span>STAGE 03 / PERCENT</span></span></a><nav class="main-nav"><a href="/">HOME</a><a class="active" href="/games/">GAMES</a><a href="/calculators/percent/">TOOLS</a><a href="/learn/percent-tricks/">GUIDE</a></nav><button class="theme-toggle" type="button" data-theme-toggle>◐</button></div></header><main class="page-wrap"><section class="game-box"><span class="eyebrow">STAGE 03</span><h1 class="page-title">퍼센트 감각 게임</h1><p class="lede">퍼센트를 보자마자 10%, 5%, 25% 같은 익숙한 조각으로 분해하는 반응을 붙여보세요.</p><div class="question-box"><span>MISSION</span><strong id="percentQuestion">예: 240의 15%는?</strong></div><div class="form-grid"><div class="field"><label for="percentAnswer">답안 입력</label><input id="percentAnswer" type="number" inputmode="decimal" placeholder="값을 입력하세요"></div></div><div class="inline-actions"><button class="solid-button" type="button" id="percentNew">▶ NEXT</button><button class="ghost-button" type="button" id="percentCheck">✓ ENTER</button></div><div class="result-box" id="percentFeedback"><strong>READY</strong><div>15%는 10%와 5%로 분해하면 판정 속도가 훨씬 빨라집니다.</div></div><div class="section"><h2>RELATED MODE</h2><div class="inline-actions"><a class="chip-link" href="/learn/percent-tricks/">PERCENT GUIDE</a><a class="chip-link" href="/calculators/percent/">PERCENT TOOL</a></div></div></section></main></div>
  <script>
    (function () {
      const q = document.getElementById("percentQuestion");
      const a = document.getElementById("percentAnswer");
      const f = document.getElementById("percentFeedback");
      let solution = 0;

      function nextQuestion() {
        const base = [120, 160, 180, 200, 240, 320, 480][Math.floor(Math.random() * 7)];
        const rate = [5, 10, 15, 20, 25, 50, 75][Math.floor(Math.random() * 7)];
        solution = (base * rate) / 100;
        q.textContent = `${base}의 ${rate}%는?`;
        a.value = "";
        a.focus();
      }

      function check() {
        const value = Number(a.value);
        if (Number.isNaN(value)) {
          return;
        }
        if (value === solution) {
          f.innerHTML = "<strong>CLEAR</strong><div>연산 성공. 다음 퍼센트 판정을 전개합니다.</div>";
        } else {
          f.innerHTML = `<strong style="color: var(--accent3);">MISS</strong><div>판정 실패. 정답은 ${solution}입니다. 기준값부터 다시 잘라 보세요.</div>`;
        }
        nextQuestion();
      }

      document.getElementById("percentNew").addEventListener("click", nextQuestion);
      document.getElementById("percentCheck").addEventListener("click", check);
      a.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          check();
        }
      });

      nextQuestion();
    })();
  </script>
</body>
</html>
